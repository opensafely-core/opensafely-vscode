---
name: Check package is buildable

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6
      - uses: "opensafely-core/setup-action@v1"
        with:
          install-just: true
      
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Check we can build the package
        run: just build